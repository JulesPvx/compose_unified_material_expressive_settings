name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Override: New version to bump to (e.g., 1.0.2). Leave empty to release current TOML version.'
        required: false
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine Target Version
        id: version_logic
        run: |
          CURRENT_VERSION=$(grep -oP '(?<=libraryVersion = ")[^"]*' gradle/libs.versions.toml)
          echo "Current version in TOML: $CURRENT_VERSION"
          
          INPUT_VERSION="${{ inputs.version }}"
          
          if [ -n "$INPUT_VERSION" ]; then
            echo "Input provided. Validating bump to: $INPUT_VERSION"
            if dpkg --compare-versions "$CURRENT_VERSION" ge "$INPUT_VERSION"; then
              echo "::error::Version bump failed. The override version ($INPUT_VERSION) must be strictly greater than the current version ($CURRENT_VERSION)."
              exit 1
            fi
            echo "TARGET_VERSION=$INPUT_VERSION" >> $GITHUB_ENV
            echo "SHOULD_BUMP=true" >> $GITHUB_ENV
          else
            echo "No override provided. Using current version."
            echo "TARGET_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
            echo "SHOULD_BUMP=false" >> $GITHUB_ENV
          fi

      - name: Update Versions in Project Files
        run: |
          if [ "${{ env.SHOULD_BUMP }}" == "true" ]; then
            sed -i -E "s/(libraryVersion = \")[^\"]*/\1${{ env.TARGET_VERSION }}/" gradle/libs.versions.toml
          fi
          sed -i -E "s/(composeSettings = \")[^\"]*/\1${{ env.TARGET_VERSION }}/" README.md
          sed -i -E "s/(io\.github\.julespvx:compose-settings-ui:)[^\"]*/\1${{ env.TARGET_VERSION }}/" README.md

      - name: Record Paparazzi Screenshots
        run: ./gradlew recordPaparazzi --no-daemon

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle/libs.versions.toml README.md sample/src/test/snapshots
          if ! git diff --cached --quiet; then
            git commit -m "chore: update version to ${{ env.TARGET_VERSION }} and refresh screenshots"
            git push
          fi

      - name: Publish to Maven Central
        run: ./gradlew publishAllPublicationsToMavenCentralRepository --no-daemon --parallel --configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSWORD }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.TARGET_VERSION }} \
            --title "Release ${{ env.TARGET_VERSION }}" \
            --generate-notes

      - name: Update Wiki Documentation
        env:
          WIKI_COMPONENTS_FILE: wiki/Components.md
        run: |
          # Checkout wiki repo
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki
          
          # Run the update script
          python3 update_wiki_components.py
          
          # Commit and push changes
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Components.md images/
          if git commit -m "docs: auto-update components for version ${{ env.TARGET_VERSION }}"; then
            git push
          else
            echo "No changes to wiki documentation."
          fi
